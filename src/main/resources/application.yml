spring:
  application:
    name: paybridge-recon
  profiles:
    default: local
  thymeleaf:
    cache: false
  mvc:
    problemdetails:
      enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081
  error:
    whitelabel:
      enabled: false
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      roles: OPERATOR

springdoc:
  swagger-ui:
    enabled: false
    path: /swagger-ui/index.html
  api-docs:
    enabled: false
    path: /api-docs

logging:
  level:
    com.paybridge.recon: INFO
  pattern:
    level: "%5p [corr:%X{correlationId:-n/a}]"

paybridge-recon:
  app:
    display-name: PayBridge Recon
    subtitle: Settlement & Reconciliation Workbench
    ui-strategy: Spring MVC pages for imports, runs, and system plus a focused React case workbench
    architecture-style: Companion reconciliation service
    react-workbench-enabled: true
  security:
    roles:
      - OPERATOR
  integration:
    paybridge:
      connect-timeout: 5s
      read-timeout: 10s
