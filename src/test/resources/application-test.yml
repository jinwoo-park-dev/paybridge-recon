spring:
  datasource:
    url: jdbc:h2:mem:paybridge_recon_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  thymeleaf:
    cache: false

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

paybridge-recon:
  security:
    operator-username: operator
    operator-password: operator-change-me
  integration:
    paybridge:
      base-url: http://localhost:8080
      operator-username: operator
      operator-password: operator-change-me
